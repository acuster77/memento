<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Momento</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-header">
      <header class="top">
        <h1>
          <img class="top-logo" src="/icons/32.png" alt="" />
          Momento
        </h1>
        <button id="rescan" title="Re-scan page for forms">
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 0-15-6.7L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 15 6.7L21 16"/><path d="M16 16h5v5"/></svg>
          Rescan
        </button>
      </header>
      <nav class="tab-bar" id="tab-bar">
        <button class="tab-btn active" id="tab-forms" data-tab="forms">
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          This Page
        </button>
        <button class="tab-btn" id="tab-library" data-tab="library">
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Library
        </button>
      </nav>
    </div>
    <main id="root">
      <div id="screen">
        <p class="loading">Scanning…</p>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
